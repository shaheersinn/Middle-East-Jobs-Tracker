name: ME Legal Jobs Tracker

on:
  schedule:
    # Run full collection every day at 06:00 UTC (9:00 AM Dubai / GST)
    - cron: "0 6 * * *"
    # Weekly digest every Sunday at 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: 'collect' (default) or 'digest'"
        required: false
        default: "collect"
      firm:
        description: "Single firm ID to test (e.g. latham, white_case)"
        required: false
        default: ""

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # Write dashboard to GitHub Pages branch
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: me_legal_jobs.db
          key: melegal-db-${{ github.run_id }}
          restore-keys: melegal-db-

      # ── Collect mode (daily) ────────────────────────────────────────────
      - name: Run tracker — daily collection
        if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ── Digest mode (Sunday) ────────────────────────────────────────────
      - name: Run tracker — weekly digest
        if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --digest

      # ── Manual dispatch ─────────────────────────────────────────────────
      - name: Run tracker — manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "digest" ]; then
            python main.py --digest
          elif [ -n "${{ github.event.inputs.firm }}" ]; then
            python main.py --firm ${{ github.event.inputs.firm }}
          else
            python main.py
          fi

      # ── Publish dashboard to GitHub Pages ──────────────────────────────
      - name: Commit dashboard to docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      # ── Upload log ──────────────────────────────────────────────────────
      - name: Upload tracker log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14
