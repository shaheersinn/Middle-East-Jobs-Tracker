name: Copilot Law Firm Tracker - Auto Refinement

on:
  schedule:
    - cron: '0 8 * * *'    # 8:00 AM UTC
    - cron: '0 14 * * *'   # 2:00 PM UTC
    - cron: '0 20 * * *'   # 8:00 PM UTC
  workflow_dispatch:         # also allows manual trigger

jobs:
  copilot-refinement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Copilot CLI
        run: |
          npm install -g @github/gh-copilot
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          gh extension install github/gh-copilot

      - name: Read Prompt File
        id: read_prompt
        run: |
          PROMPT=$(cat .github/prompts/tracker-iteration.prompt.md)
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Copilot Refinement Cycle
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d-%H%M")
          CYCLE_DIR="cycles/${TIMESTAMP}"
          mkdir -p $CYCLE_DIR

          copilot -p "$(cat .github/prompts/tracker-iteration.prompt.md)" \
            --allow-all-tools \
            --deny-tool 'shell(cd)' \
            --deny-tool 'shell(git)' \
            --deny-tool 'fetch' \
            --deny-tool 'websearch' \
            > "${CYCLE_DIR}/output.md" 2>&1

      - name: Commit Cycle Output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Copilot Auto Cycle"
          git add cycles/
          git diff --staged --quiet || git commit -m "auto: Copilot refinement cycle $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify on Failure Only
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Copilot auto-cycle failed - ${new Date().toISOString()}`,
              body: 'The scheduled Copilot refinement cycle failed. Check the Actions log.',
              labels: ['copilot-auto', 'needs-review']
            })
